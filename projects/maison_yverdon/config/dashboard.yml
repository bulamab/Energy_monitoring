# projects/maison_yverdon/config/dashboard.yml

title: "Maison Yverdon"

navigation:

  - id: global
    title: "Vue globale"
    sections:

      - id: financial
        title: "Indicateurs financiers"
        kpis:
          - id: cost_annual
            kpi_ref: stacked
            title: "Coûts annuels"
            inputs:
              meters:
               - meter: cost_elec
                 label: "Électricité"
               - meter: cost_gas
                 label: "Gaz"
               - meter: cost_feed_in
                 label: "Revenu PV"
                 sign: negative
              unit: CHF
              resolution: yearly
              years: [2025, 2026]    # ← années à afficher

          - id: cost_monthly
            kpi_ref: monthly_sum_multi_year
            title: "Coût énergie mensuel"
            inputs:
              meter: cost_total
              unit: CHF
              years: [2025, 2026]

          - id: cost_stacked
            kpi_ref: stacked
            title: "Décomposition coûts énergie"
            inputs:
              meters:
              - meter: cost_elec
                label: "Électricité"
              - meter: cost_gas
                label: "Gaz"
              - meter: cost_feed_in
                label: "Revenu PV"
                sign: negative
              unit: CHF
              line:
                 type: cumulative_sum
                 label: "Cumul annuel"
                 color: "#2c3e50"

      - id: primary_energy
        title: "Énergie primaire"
        kpis:
          - id: elec_multi_year
            kpi_ref: monthly_sum_multi_year
            title: "Électricité finale"
            inputs:
              meter: elec_final
              unit: kWh
              years: [2025, 2026]
          - id: gas_multi_year
            kpi_ref: monthly_sum_multi_year
            title: "Consommation gaz"
            inputs:
              meter: gas_in
              unit: kWh
              years: [2025, 2026]

      - id: sankey
        title: "Diagramme de Sankey"
        kpis: []

  - id: needs
    title: "Besoins énergétiques"
    sections:
      - id: heating
        title: "Chauffage"
        kpis:
          - id: energy_label
            kpi_ref: energy_label_heating
            title: "Étiquette énergie — enveloppe"
            inputs:
              heat_meter: heat_demand_measured
              dj_meter: dj_20_12
              dj_ref_meter: dj_reference_daily
              years: [2025, 2026]

          - id: heating_multi_year_normalized
            kpi_ref: monthly_sum_multi_year
            title: "Besoins chauffage normalisés climatiquement"
            inputs:
              meter: heat_demand_normalized
              unit: kWh
              years: [2025, 2026]
            
          - id: energy_signature_power
            kpi_ref: scatter
            title: "Signature énergétique"
            inputs:
              x_meter: temp_ext
              y_meter: heat_power_mean
              x_label: "Température extérieure"
              y_label: "Puissance de chauffage moyenne"
              unit_x: "°C"
              unit_y: "kW"
              years: [2025, 2026]
              resolution: daily #monthly #daily
              trendline: true
              y_min: 0.1        # exclut les jours sans chauffage
              x_max: 15       # exclut les jours chauds sans intérêt
            

              

      - id: dhw
        title: "Eau chaude sanitaire"
        kpis:
          - id: dhw_multi_year
            kpi_ref: monthly_sum_multi_year
            title: "Besoins ECS"
            inputs:
              meter: dhw_measured_boiler
              unit: kWh
              years: [2025, 2026]

      - id: electricity
        title: "Électricité ménage"
        kpis: []

      - id: mobility
        title: "Mobilité"
        kpis: []

  - id: equipment
    title: "Équipements"
    sections:
      - id: boiler
        title: "Chaudière gaz"
        kpis:
          - id: gas_monthly
            kpi_ref: monthly_sum_multi_year
            title: "Consommation gaz mensuelle"
            inputs:
              meter: gas_in
              unit: kWh
              years: [2025, 2026]
          - id: boiler_efficiency_multi_year
            kpi_ref: monthly_sum_multi_year
            title: "Efficacité chaudière"
            inputs:
              meter: boiler_efficiency
              unit: "%"
              years: [2025, 2026]
      

      - id: dhw_pac
        title: "Chauffe-eau PAC"
        kpis: []

      - id: pv
        title: "Photovoltaïque"
        kpis:
          - id: pv_multi_year
            kpi_ref: monthly_sum_multi_year
            title: "Production PV"
            inputs:
              meter: pv_production
              unit: kWh
              years: [2025, 2026]

          - id: pv_vs_radiation
            kpi_ref: stacked
            title: "Production PV vs Rayonnement solaire"
            inputs:
              meters:
                - meter: pv_production
                  label: "Production PV"
              unit: kWh
              line:
                type: meter
                meter: solar_irradiance
                label: "Rayonnement solaire"
                color: "#f39c12"
                unit: "W/m²"
                axis: secondary

          - id: pv_self_consumption_rate
            kpi_ref: bullet
            title: "Taux d'autoconsommation PV (autoconsommation / production)"
            inputs:
              numerator: pv_self_consumption
              denominator: pv_production
              years: [2025, 2026]
              target: 60
              min: 0
              max: 100
              ranges:
                - to: 30
                  color: "#e74c3c"
                - to: 60
                  color: "#f39c12"
                - to: 100
                  color: "#2ecc71"
                  
          - id: pv_self_production_rate
            kpi_ref: bullet
            title: "Degré d'autonomie PV (autoconsommation / consommation totale)"
            inputs:
              numerator: pv_self_consumption
              denominator: elec_final
              years: [2025, 2026]
              target: 60
              min: 0
              max: 100
              ranges:
                - to: 30
                  color: "#e74c3c"
                - to: 60
                  color: "#f39c12"
                - to: 100
                  color: "#2ecc71"
            
          - id: pv_performance_ratio
            kpi_ref: bullet
            title: "Performance installation PV (production / énergie solaire reçue)"
            inputs:
              numerator: pv_production
              denominator: pv_irradiance_energy
              years: [2025, 2026]
              target: 15
              min: 0
              max: 20
              ranges:
                - to: 8
                  color: "#e74c3c"
                - to: 12
                  color: "#f39c12"
                - to: 20
                  color: "#2ecc71"

          - id: pv_hours_year_bullet
            kpi_ref: bullet
            title: "Heures de production PV à pleine charge"
            inputs:
              numerator: pv_hours_year
              years: [2023, 2024, 2025, 2026]
              unit: "h"
              target: 900        # référence suisse
              min: 0
              max: 1300
              ranges:
                - to: 700
                  color: "#e74c3c"
                - to: 900
                  color: "#f39c12"
                - to: 1300
                  color: "#2ecc71"
