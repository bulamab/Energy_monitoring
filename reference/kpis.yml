# reference/kpis.yml
# Bibliothèque de KPIs — indépendante de tout projet

kpis:

  monthly_sum:
    description: "Agrégation mensuelle d'un compteur"
    unit: "from_meter"
    aggregation: monthly
    display_ref: bar_monthly
    required_inputs:
      meter:
        description: "Compteur à agréger"
        unit: any

  monthly_sum_multi_year:
    description: "Agrégation mensuelle multi-années — comparaison inter-annuelle"
    unit: "from_meter"
    aggregation: monthly_multi_year
    display_ref: bar_monthly_multi_year
    required_inputs:
      meter:
        description: "Compteur à agréger"
        unit: any
      years:
        description: "Liste des années à comparer"
        type: list

  stacked:
    description: "Histogramme empilé — plusieurs meters, résolution paramétrable"
    unit: "from_meters"
    display_ref: bar_stacked
    required_inputs:
      meters:
        description: "Liste de meters [{meter, label, sign?}]"
        type: list
      unit:
        description: "Unité commune à tous les meters"
    optional_inputs:
      resolution:
        description: "monthly (défaut) | yearly | weekly"
        default: monthly
      line:
        description: "Ligne optionnelle superposée"
        fields:
          type: "cumulative_sum | meter | reference"
          label: "Label affiché dans la légende"
          color: "Couleur hex"
          unit: "Unité de la ligne si différente"
          axis: "primary (défaut) | secondary"
          meter: "meter_id si type=meter"
          value: "constante si type=reference"

  scatter:
    description: "Scatter plot avec courbe de tendance"
    display_ref: scatter_trend
    required_inputs:
      x_meter: "Meter pour axe X"
      y_meter: "Meter pour axe Y"

  energy_label_heating:
    description: "Label énergie pour le chauffage — calculé selon SIA 380/1"
    display_ref: energy_label_heating
    required_inputs:
        heat_meter   : "meter chaleur chauffage (défaut: heat_demand_measured)"
        dj_meter     : "meter DJ réels          (défaut: dj_20_12)"
        dj_ref_meter : "meter DJ référence      (défaut: dj_reference_daily)"
        year         : "année à afficher"

  bullet:
    description: "Jauge bullet — ratio annuel entre deux compteurs, ou valeur directe d'un compteur, sélection d'année"
    display_ref: bullet
    required_inputs:
      numerator:
        description: "Meter à afficher (numérateur si ratio, valeur directe sinon)"
      years:
        description: "Liste des années sélectionnables"
        type: list
    optional_inputs:
      denominator:
        description: "Meter au dénominateur — si omis, affiche la somme annuelle de 'numerator' directement (pas de ratio, pas de ×100)"
      unit:
        description: "Défaut '%' si denominator fourni, sinon vide — à préciser explicitement (ex: 'h')"
      target:
        description: "Valeur cible — ligne repère verticale"
      min:
        description: "Borne basse axe (défaut: 0)"
      max:
        description: "Borne haute axe (défaut: 100)"
      ranges:
        description: "Zones qualitatives [{to, color}], triées croissant"